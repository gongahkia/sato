name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Go binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -o sato-pulse-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/sato-pulse

      - uses: actions/upload-artifact@v4
        with:
          name: sato-pulse-${{ matrix.goos }}-${{ matrix.goarch }}
          path: sato-pulse-${{ matrix.goos }}-${{ matrix.goarch }}

  python-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build wheel
        run: |
          cd mood-engine
          pip install build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: mood-engine/dist/*

  release:
    needs: [build, python-wheel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
